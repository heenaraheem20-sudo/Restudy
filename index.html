<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>restudyLLM - Research Assistant</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #60a5fa; border-radius: 3px; }
        .bg-deep-blue { background-color: #1e3a8a; }
        .text-deep-blue { color: #1e3a8a; }
        .border-deep-blue { border-color: #1e3a8a; }
        
        .lined-paper {
            background-color: #ffffff;
            background-image: linear-gradient(#bfdbfe 1px, transparent 1px);
            background-size: 100% 2rem;
            line-height: 2rem;
            padding: 0.5rem 1rem;
        }
        .mindmap-node { transition: all 0.3s ease; cursor: pointer; }
        .mindmap-node:hover { transform: scale(1.05); box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); }
    </style>
</head>
<body class="bg-blue-50 h-screen flex flex-col font-sans text-blue-900">

    <header class="bg-blue-900 text-white border-b border-blue-800 px-4 py-3 flex items-center justify-between">
        <h1 class="text-xl font-bold">restudyLLM</h1>
        <div class="flex items-center gap-3">
            <input id="apiKey" type="password" placeholder="API Key" class="border border-blue-700 p-2 rounded text-sm w-48 bg-blue-800 text-white placeholder-blue-300 focus:outline-none">
            <button id="connectBtn" class="bg-blue-500 px-4 py-2 rounded text-sm font-medium hover:bg-blue-400">Connect</button>
            <div id="statusIndicator" class="w-3 h-3 rounded-full bg-blue-700"></div>
        </div>
    </header>

    <main class="flex-1 flex overflow-hidden">
        <aside class="w-64 bg-white border-r border-blue-200 flex flex-col p-4">
            <h2 class="font-semibold mb-4 text-blue-900">Papers</h2>
            <input type="file" id="pdfUpload" multiple accept=".pdf" class="hidden">
            <label for="pdfUpload" class="cursor-pointer bg-blue-900 text-white py-2 px-4 rounded text-center text-sm font-medium hover:bg-blue-800 mb-4 block">Upload PDF</label>
            <div id="docList" class="flex-1 overflow-y-auto space-y-2 mb-4"></div>
            
            <div class="space-y-2 border-t border-blue-100 pt-4">
                <button id="mindMapBtn" class="w-full bg-blue-100 text-blue-900 py-2 rounded text-sm hover:bg-blue-200 font-medium">View Mind Map</button>
                <button id="presentationBtn" class="w-full bg-blue-600 text-white py-2 rounded text-sm hover:bg-blue-700 font-medium">Create Presentation</button>
            </div>
        </aside>

        <section class="flex-1 bg-blue-50 overflow-hidden relative" id="viewerArea">
            <div id="pdfContainer" class="w-full h-full overflow-y-auto p-4 flex flex-col items-center">
                <p class="text-center text-blue-400 mt-20">Select a paper to begin.</p>
            </div>
            
            <div id="overlay" class="fixed inset-0 bg-white z-[100] p-8 hidden flex flex-col">
                <div class="flex justify-between items-center mb-6 border-b pb-4">
                    <h2 id="overlayTitle" class="text-2xl font-bold text-blue-900">Content</h2>
                    <button onclick="document.getElementById('overlay').classList.add('hidden')" class="bg-blue-900 text-white px-6 py-2 rounded hover:bg-blue-800">Close</button>
                </div>
                <div id="overlayContent" class="flex-1 overflow-auto"></div>
            </div>
        </section>

        <section class="w-80 bg-white border-l border-blue-200 flex flex-col">
            <div class="flex border-b border-blue-100">
                <button onclick="switchTab('chat')" id="tabBtnChat" class="flex-1 py-3 text-sm font-semibold border-b-2 border-blue-900 text-blue-900">Chat</button>
                <button onclick="switchTab('notes')" id="tabBtnNotes" class="flex-1 py-3 text-sm font-semibold text-blue-400">Notes</button>
            </div>
            <div id="tabContent" class="flex-1 overflow-y-auto p-4 space-y-4">
                <div id="chatContent" class="space-y-4"></div>
                <div id="notesSection" class="hidden h-full flex flex-col">
                    <textarea id="notesContent" class="lined-paper flex-1 w-full border border-blue-200 rounded focus:outline-none focus:ring-2 focus:ring-blue-300" placeholder="Take notes here..."></textarea>
                    <button id="generateNotesBtn" class="mt-2 bg-blue-600 text-white py-2 rounded text-sm hover:bg-blue-700">✨ AI Quick Notes</button>
                </div>
            </div>
            <div id="inputArea" class="p-4 border-t border-blue-100">
                <textarea id="chatInput" class="w-full border border-blue-200 rounded p-2 text-sm focus:outline-none focus:ring-1 focus:ring-blue-400" rows="2" placeholder="Ask questions..."></textarea>
                <div class="flex gap-2 mt-2">
                    <button id="sendBtn" class="flex-1 bg-blue-900 text-white py-2 rounded text-sm hover:bg-blue-800">Ask Gemini</button>
                    <button id="eli5Btn" class="bg-blue-600 text-white px-4 py-2 rounded text-sm hover:bg-blue-700">✨ ELI5</button>
                </div>
            </div>
        </section>
    </main>

    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';
        let apiKey = '', currentDocText = "", slides = [], currentSlide = 0;

        function switchTab(tab) {
            ['chat', 'notes'].forEach(t => {
                const isTarget = tab === t;
                const section = document.getElementById(t === 'notes' ? 'notesSection' : t + 'Content');
                if (section) section.classList.toggle('hidden', !isTarget);
                const btn = document.getElementById('tabBtn' + t.charAt(0).toUpperCase() + t.slice(1));
                if(btn) {
                    btn.classList.toggle('border-b-2', isTarget);
                    btn.classList.toggle('border-blue-900', isTarget);
                    btn.classList.toggle('text-blue-900', isTarget);
                    btn.classList.toggle('text-blue-400', !isTarget);
                }
            });
            document.getElementById('inputArea').style.display = tab === 'chat' ? 'block' : 'none';
        }

        document.getElementById('connectBtn').onclick = () => {
            apiKey = document.getElementById('apiKey').value;
            document.getElementById('statusIndicator').style.backgroundColor = apiKey ? '#22c55e' : '#f87171';
        };

        async function queryGemini(userPrompt, context = currentDocText, retryCount = 0) {
            if (!apiKey) return alert("Connect API Key first.");
            const fullPrompt = `Document: ${context.substring(0, 8000)}\n\nQuery: ${userPrompt}`;
            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: fullPrompt }] }] })
                });
                if (response.status === 429 && retryCount < 3) {
                    await new Promise(resolve => setTimeout(resolve, Math.pow(2, retryCount) * 1000));
                    return queryGemini(userPrompt, context, retryCount + 1);
                }
                const data = await response.json();
                return data?.candidates?.[0]?.content?.parts?.[0]?.text;
            } catch (err) { console.error(err); return null; }
        }

        document.getElementById('presentationBtn').onclick = async () => {
            if (!currentDocText) return alert("Upload a paper.");
            document.getElementById('overlay').classList.remove('hidden');
            document.getElementById('overlayTitle').textContent = "Presentation";
            const content = document.getElementById('overlayContent');
            content.innerHTML = "Generating slides...";
            
            const prompt = "Generate a JSON array of 5 slides summarizing this paper. Format: [ { 'title': '', 'content': '', 'notes': '' } ]";
            const res = await queryGemini(prompt);
            if (res) {
                try {
                    slides = JSON.parse(res.replace(/```json|```/g, ''));
                    currentSlide = 0;
                    renderSlide();
                } catch(e) { content.innerHTML = "Error generating presentation."; }
            }
        };

        function renderSlide() {
            const s = slides[currentSlide];
            document.getElementById('overlayContent').innerHTML = `
                <div class="h-full flex flex-col justify-center items-center p-10 bg-white">
                    <h2 class="text-4xl font-bold mb-6 text-blue-900">${s.title}</h2>
                    <p class="text-xl mb-8 text-blue-800">${s.content}</p>
                    <div class="bg-blue-50 p-4 rounded text-sm italic w-full border-l-4 border-blue-400">Speaker Notes: ${s.notes}</div>
                    <div class="mt-8 flex gap-4">
                        <button onclick="if(currentSlide > 0) { currentSlide--; renderSlide(); }" class="px-6 py-2 bg-blue-100 text-blue-900 rounded hover:bg-blue-200">Back</button>
                        <button onclick="if(currentSlide < slides.length - 1) { currentSlide++; renderSlide(); }" class="px-6 py-2 bg-blue-900 text-white rounded hover:bg-blue-800">Next</button>
                    </div>
                </div>
            `;
        }

        document.getElementById('mindMapBtn').onclick = async () => {
            if (!currentDocText) return alert("Upload a paper.");
            document.getElementById('overlay').classList.remove('hidden');
            document.getElementById('overlayTitle').textContent = "Mind Map";
            const content = document.getElementById('overlayContent');
            content.innerHTML = "Generating map...";
            const res = await queryGemini("Create a JSON mind map: { 'nodes': [ { 'label': '', 'desc': '' } ] }");
            if (res) {
                try {
                    const data = JSON.parse(res.replace(/```json|```/g, ''));
                    content.innerHTML = `<div class="flex flex-wrap gap-4">${data.nodes.map(n => `<div class="p-6 bg-blue-50 border border-blue-200 shadow-sm w-72 rounded-xl"><h3 class="font-bold text-blue-900 mb-2">${n.label}</h3><p class="text-xs text-blue-700">${n.desc}</p></div>`).join('')}</div>`;
                } catch(e) { content.innerHTML = "Error generating map."; }
            }
        };

        document.getElementById('generateNotesBtn').onclick = async () => {
            if (!currentDocText) return alert("Load a document first.");
            document.getElementById('notesContent').value = "Generating...";
            const notes = await queryGemini("Extract key insights, terminology, and conclusions.");
            if (notes) document.getElementById('notesContent').value = notes;
        };

        document.getElementById('eli5Btn').onclick = async () => {
            if (!currentDocText) return alert("Load a document first.");
            const resp = await queryGemini("Explain this paper like I'm five.");
            if (resp) document.getElementById('chatContent').innerHTML += `<div class="bg-blue-100 p-2 rounded text-sm"><b>ELI5:</b> ${marked.parse(resp)}</div>`;
        };

        document.getElementById('sendBtn').onclick = async () => {
            const msg = document.getElementById('chatInput').value;
            document.getElementById('chatContent').innerHTML += `<div class="bg-blue-50 p-2 rounded text-sm border border-blue-100"><b>You:</b> ${msg}</div>`;
            document.getElementById('chatInput').value = '';
            const resp = await queryGemini(msg);
            if (resp) document.getElementById('chatContent').innerHTML += `<div class="bg-blue-900 text-white p-2 rounded text-sm"><b>Gemini:</b> ${marked.parse(resp)}</div>`;
        };

        async function loadPdf(file) {
            const container = document.getElementById('pdfContainer');
            container.innerHTML = 'Extracting content...';
            const reader = new FileReader();
            reader.onload = async () => {
                const pdf = await pdfjsLib.getDocument(new Uint8Array(reader.result)).promise;
                container.innerHTML = '';
                let fullText = "";
                for (let i = 1; i <= pdf.numPages; i++) {
                    const page = await pdf.getPage(i);
                    const content = await page.getTextContent();
                    fullText += content.items.map(item => item.str).join(" ") + "\n";
                    const canvas = document.createElement('canvas');
                    canvas.className = 'w-full shadow mb-4';
                    container.appendChild(canvas);
                    const viewport = page.getViewport({ scale: 1.2 });
                    canvas.height = viewport.height; canvas.width = viewport.width;
                    page.render({ canvasContext: canvas.getContext('2d'), viewport: viewport });
                }
                currentDocText = fullText;
            };
            reader.readAsArrayBuffer(file);
        }

        document.getElementById('pdfUpload').onchange = (e) => {
            Array.from(e.target.files).forEach(file => {
                const div = document.createElement('div');
                div.className = 'p-2 text-sm bg-blue-50 hover:bg-blue-100 cursor-pointer rounded border border-blue-100 truncate';
                div.textContent = file.name;
                div.onclick = () => loadPdf(file);
                document.getElementById('docList').appendChild(div);
            });
        };
    </script>
</body>
</html>
